<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkillForge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚡</span>
        SkillForge
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="features.html">Features</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
  </div>

  <!-- Login Form -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue your learning journey</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@example.com"
            required
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position: relative;">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Enter your password"
              required
            >
            <button 
              type="button" 
              id="togglePassword"
              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem;"
            >👁️</button>
          </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="remember" style="accent-color: var(--primary);">
            <span style="font-size: 0.9rem; color: var(--text-light);">Remember me</span>
          </label>
          <a href="#" style="font-size: 0.9rem; color: var(--primary);">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Sign In
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Don&apos;t have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
    });
    
    // Form submission
    const loginForm = document.getElementById('loginForm');
    
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      // Clear previous errors
      clearError(document.getElementById('email'));
      clearError(document.getElementById('password'));
      
      // Validate email
      if (!validateEmail(email)) {
        showError(document.getElementById('email'), 'Please enter a valid email address');
        return;
      }
      
      // Validate password
      if (password.length < 6) {
        showError(document.getElementById('password'), 'Password must be at least 6 characters');
        return;
      }
      
      // Simulate login (in a real app, this would be an API call)
      showToast('Success', 'Login successful! Redirecting...', 'success');
      
      // Store login state
      localStorage.setItem('skillforge_user', JSON.stringify({ email }));
      
      // Redirect to dashboard after a short delay
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
