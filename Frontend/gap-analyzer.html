<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gap Analyzer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page-header">
    <h1>Skill Gap Analyzer</h1>
    <p>Find what you're missing</p>
  </div>

  <div class="page-content">

    <div class="card">

      <div class="form-group">
        <label class="form-label">Current Skills</label>
        <input type="text" id="currentSkills" class="form-input" placeholder="e.g. HTML, CSS">
      </div>

      <div class="form-group">
        <label class="form-label">Target Skills</label>
        <input type="text" id="targetSkills" class="form-input" placeholder="e.g. React, Node">
      </div>

      <button class="btn btn-primary" onclick="analyzeGap()">Analyze Gap</button>

    </div>

    <div class="results-section" id="gapResult"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
