<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gap Analyzer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚡</span>
        SkillForge
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="skill-analyzer.html">Skill Analyzer</a></li>
        <li><a href="gap-analyzer.html" class="active">Gap Analyzer</a></li>
        <li><a href="planner.html">Planner</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="skill-analyzer.html">Skill Analyzer</a></li>
      <li><a href="gap-analyzer.html">Gap Analyzer</a></li>
      <li><a href="planner.html">Planner</a></li>
    </ul>
  </div>
  <div class="page-header">
    <h1>Skill Gap Analyzer</h1>
    <p>Find what you're missing</p>
  </div>

  <div class="page-content">

    <div class="card">

      <div class="form-group">
        <label class="form-label">Current Skills</label>
        <input type="text" id="currentSkills" class="form-input" placeholder="e.g. HTML, CSS">
      </div>

      <div class="form-group">
        <label class="form-label">Target Skills</label>
        <input type="text" id="targetSkills" class="form-input" placeholder="e.g. React, Node">
      </div>

      <button class="btn btn-primary" onclick="analyzeGap()">Analyze Gap</button>

    </div>

    <div class="results-section markdown-body card" id="gapResult" style="display: none; margin-top: 20px;"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
